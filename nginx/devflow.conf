# ═══════════════════════════════════════════════════════════════════
# Nginx Config for DevFlow AI on EC2
# 
# Place this file at: /etc/nginx/sites-available/devflow
# Then: ln -s /etc/nginx/sites-available/devflow /etc/nginx/sites-enabled/
# Then: nginx -t && systemctl reload nginx
# ═══════════════════════════════════════════════════════════════════

# ── DevFlow Main App ──────────────────────────────────────────────────────────
server {
    listen 80;
    server_name your-domain.com www.your-domain.com;
    # If no domain, use: server_name _;

    # ── Frontend (React) ──────────────────────────────────────────────────────
    location / {
        proxy_pass         http://localhost:5173;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Backend API ───────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── WebSocket — Server Terminal ───────────────────────────────────────────
    location /terminal {
        proxy_pass         http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 3600s;
    }

    # ── WebSocket — Container Terminal ───────────────────────────────────────
    location /container-terminal {
        proxy_pass         http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 3600s;
    }

    # File upload size
    client_max_body_size 50M;
}


# ═══════════════════════════════════════════════════════════════════
# User App Containers — Dynamic Proxy
# Each container runs on port 4000-5999
# Access: http://your-domain.com:PORT  (direct port access)
# 
# OR for subdomain setup (requires wildcard DNS):
# app1.your-domain.com → port 4000
# app2.your-domain.com → port 4001
# ═══════════════════════════════════════════════════════════════════

